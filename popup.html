<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 360px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: #fff;
  }
  .header {
    background: linear-gradient(135deg, #FF2442 0%, #ff4d6a 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .logo {
    width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .header .title { color: white; font-size: 16px; font-weight: 600; }
  .search-box {
    padding: 16px 20px 12px;
    display: flex; gap: 8px;
  }
  .search-input {
    flex: 1; padding: 10px 14px; border: 1.5px solid #eee; border-radius: 10px;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #FF2442; }
  .search-btn {
    padding: 10px 16px; background: #FF2442; color: white; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .search-btn:hover { background: #e61f3d; }
  .section-title {
    padding: 8px 20px; font-size: 12px; color: #999; font-weight: 500;
    display: flex; justify-content: space-between; align-items: center;
  }
  .clear-btn {
    font-size: 11px; color: #bbb; cursor: pointer; border: none; background: none;
  }
  .clear-btn:hover { color: #FF2442; }
  .history-list {
    max-height: 320px; overflow-y: auto;
  }
  .history-item {
    padding: 10px 20px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: background 0.15s; border-bottom: 1px solid #f5f5f5;
  }
  .history-item:hover { background: #fff5f7; }
  .history-item .icon { font-size: 14px; color: #ccc; flex-shrink: 0; }
  .history-item .text {
    flex: 1; font-size: 14px; color: #333;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-item .time { font-size: 11px; color: #ccc; flex-shrink: 0; }
  .empty {
    padding: 40px 20px; text-align: center; color: #ccc; font-size: 13px;
  }
  .empty .emoji { font-size: 32px; margin-bottom: 8px; display: block; }
  .footer {
    padding: 12px 20px; border-top: 1px solid #f0f0f0;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #aaa;
  }
  .footer .shortcut {
    display: flex; align-items: center; gap: 4px;
  }
  .footer .key {
    padding: 2px 6px; background: #f5f5f5; border-radius: 4px;
    font-family: monospace; font-size: 11px; border: 1px solid #e0e0e0;
  }
  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">🔍</div>
    <div class="title">小红书一键搜索</div>
  </div>

  <div class="search-box">
    <input class="search-input" id="searchInput" type="text" placeholder="输入关键词搜索小红书…" autocomplete="off">
    <button class="search-btn" id="searchBtn">搜索</button>
  </div>

  <div class="section-title">
    <span>最近搜索</span>
    <button class="clear-btn" id="clearBtn" style="display:none;">清空</button>
  </div>

  <div class="history-list" id="historyList">
    <div class="empty" id="emptyState">
      <span class="emoji">📝</span>
      暂无搜索记录<br>
      选中网页文字右键或按快捷键即可搜索
    </div>
  </div>

  <div class="footer">
    <span>v1.6.0</span>
    <div class="shortcut">
      <span class="key">⌥</span> + <span class="key">⇧</span> + <span class="key">⏎</span>
      <span style="margin-left:4px;">一键搜索</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
